name: Docker Build and Push

on:
  push:
    branches:
      - main  # 监听 main 分支的 push 操作
    paths-ignore:
      # 忽略以下文件/目录的修改，不触发 Docker 构建
      - 'README.md'
      - 'LICENSE'
      - 'config.example.yaml'
      - 'docker-compose.yml'
      - '.gitignore'
      - '.dockerignore'
      - '.github/workflows/sign-in.yml' # 忽略签到工作流的修改

jobs:
  build-and-push:
    name: Build Multi-Arch Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 设置 QEMU 以支持编译 ARM 等跨平台架构
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 设置 Docker Buildx 构建器
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 Docker Hub (使用配置的 Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 执行多架构编译并自动推送到 Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64  # 自动构建双架构
          push: true
          tags: kafuneri/skland-sign-in:latest
